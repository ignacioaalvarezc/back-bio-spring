version: '3'

services:
  app_bio:
    build: backend
    mem_limit: 512m
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://back-bio:3306/spring-courses?createDatabaseIfNoExist=true
      DB_USER_NAME: root
      DB_PASSWORD: nacho
    restart: always
    depends_on:
      back-bio:
        condition: service_healthy
  back-bio:
    image: mysql:8.0.33
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: nacho
      MYSQL_PASSWORD: nacho
      MYSQL_DATABASE: spring-courses
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10